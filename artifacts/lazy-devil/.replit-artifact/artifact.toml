kind = "mobile"
previewPath = "/"
title = "Lazy Devil Terminal"
version = "1.0.0"
id = "artifacts/lazy-devil"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18537

[services.development]
run = "pnpm --filter @workspace/lazy-devil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lazy-devil", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lazy-devil", "run", "serve" ]

[services.env]
PORT = "18537"
BASE_PATH = "/"
